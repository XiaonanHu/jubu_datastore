  - id: ngss.engineering.compare_solutions
    framework: ngss
    domain: science
    subdomain: engineering
    title: Compares how well different solutions work
    short_label: Compare solutions
    parent_friendly_label: Figures out which idea works better
    description: >
      Child can compare two approaches to solving the same problem,
      identifying strengths and weaknesses of each.
    ngss_source:
      performance_expectations:
        - K-2-ETS1-3
      disciplinary_core_ideas:
        - ETS1.C  # Optimizing the Design Solution
