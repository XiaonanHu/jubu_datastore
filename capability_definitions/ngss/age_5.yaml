    observable_signals:
      - says one idea is better than another and explains why
      - identifies what works and what doesn't about each option
      - uses comparison language (better, worse, stronger, faster)
      - considers trade-offs between two designs
    example_prompts:
      - "We tried a bridge and a boat — which one worked better for the turtle?"
      - "The bear's first idea broke — how is the new one different?"
